apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: catalog-api
  template:
    metadata:
      labels:
        app: catalog-api
    spec:
      containers:
        - name: catalog-api
          image: cloudtracing/catalog:v5
          imagePullPolicy: IfNotPresent
          env:
            - name: POSTGRES_DSN
              value: postgres://lab:lab@$(POSTGRES_SERVICE_HOST):$(POSTGRES_SERVICE_PORT)/lab?sslmode=disable
            - name: REDIS_ADDR
              value: $(REDIS_SERVICE_HOST):$(REDIS_SERVICE_PORT)
            - name: MEILISEARCH_URL
              value: http://$(MEILISEARCH_SERVICE_HOST):$(MEILISEARCH_SERVICE_PORT)
            - name: OTEL_EXPORTER_OTLP_TRACES_ENDPOINT
              value: http://$(JAEGER_SERVICE_HOST):$(JAEGER_SERVICE_PORT_OTLP_HTTP)/v1/traces
            - name: SCENARIO_FILE
              value: /config/scenarios.json
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          volumeMounts:
            - name: scenarios
              mountPath: /config/scenarios.json
              subPath: scenarios.json
      volumes:
        - name: scenarios
          configMap:
            name: trace-lab-scenarios
---
apiVersion: v1
kind: Service
metadata:
  name: catalog-api
spec:
  selector:
    app: catalog-api
  ports:
    - port: 8080
      targetPort: 8080
---
