# Jaeger release v2.17.0 maps to jaegertracing/jaeger commit
# b5be18b10053a087a9bb272a1d9a0c71bcaac2c7.
service:
  extensions: [jaeger_storage, jaeger_query, healthcheckv2]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [jaeger_storage_exporter]
  telemetry:
    resource:
      service.name: jaeger
    logs:
      level: info

extensions:
  healthcheckv2:
    use_v2: true
    http:
      endpoint: 0.0.0.0:13133

  jaeger_query:
    storage:
      traces: in_memory
    http:
      endpoint: 0.0.0.0:16684

  jaeger_storage:
    backends:
      in_memory:
        memory:
          max_traces: 80

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:

exporters:
  jaeger_storage_exporter:
    trace_storage: in_memory
