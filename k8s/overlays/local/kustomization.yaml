apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

images:
  - name: cloudtracing/catalog
    newName: localhost:30300/cloudtracing/catalog
    newTag: v1
  - name: cloudtracing/inventory
    newName: localhost:30300/cloudtracing/inventory
    newTag: v1
  - name: cloudtracing/orders
    newName: localhost:30300/cloudtracing/orders
    newTag: v1
  - name: cloudtracing/payments
    newName: localhost:30300/cloudtracing/payments
    newTag: v1
  - name: cloudtracing/edge
    newName: localhost:30300/cloudtracing/edge
    newTag: v1
  - name: cloudtracing/shop-web
    newName: localhost:30300/cloudtracing/shop-web
    newTag: v1
  - name: cloudtracing/coach
    newName: localhost:30300/cloudtracing/coach
    newTag: v1

patches:
  - path: image-pull-policy.yaml
  - path: localhost-ports.yaml
