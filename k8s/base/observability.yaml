apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jaeger
  template:
    metadata:
      labels:
        app: jaeger
    spec:
      containers:
        - name: jaeger
          # Jaeger release v2.17.0 maps to jaegertracing/jaeger commit
          # b5be18b10053a087a9bb272a1d9a0c71bcaac2c7.
          image: cr.jaegertracing.io/jaegertracing/jaeger:2.17.0
          imagePullPolicy: IfNotPresent
          args:
            - --config
            - /etc/jaeger/config.yaml
          ports:
            - containerPort: 16684
            - containerPort: 4317
            - containerPort: 4318
            - containerPort: 13133
          readinessProbe:
            httpGet:
              path: /status
              port: 13133
            initialDelaySeconds: 3
            periodSeconds: 5
          volumeMounts:
            - name: jaeger-config
              mountPath: /etc/jaeger
              readOnly: true
        - name: jaeger-ui
          # Jaeger UI release v2.17.0 maps to jaegertracing/jaeger-ui commit
          # 4e887dcec50fb9f7b675fb4619ea8e3fb4c0447f.
          image: cloudtracing/jaeger-ui:v6
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 16686
          readinessProbe:
            httpGet:
              path: /
              port: 16686
            initialDelaySeconds: 3
            periodSeconds: 5
      volumes:
        - name: jaeger-config
          configMap:
            name: jaeger-config
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger
spec:
  selector:
    app: jaeger
  ports:
    - name: ui
      port: 16686
      targetPort: 16686
    - name: query-api
      port: 16684
      targetPort: 16684
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
---
